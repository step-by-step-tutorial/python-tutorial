name: dev
services:
  database:
    image: postgres:16
    container_name: database
    hostname: database
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: sale_oltp
    ports:
      - "5432:5432"
    volumes:
      - database_data:/var/lib/postgresql/data
      - ./scripts/create_postgres_tables.sql:/docker-entrypoint-initdb.d/create_postgres_tables.sql
  databaseui:
    image: adminer
    container_name: databaseui
    hostname: databaseui
    restart: always
    ports:
      - "8080:8080"
  datalake:
    image: minio/minio:latest
    container_name: datalake
    hostname: datalake
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: administrator
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
  datawarehouse:
    image: clickhouse/clickhouse-server:latest
    container_name: datawarehouse
    hostname: datawarehouse
    environment:
      CLICKHOUSE_USER: admin
      CLICKHOUSE_PASSWORD: admin
    ports:
      - "8123:8123"
      - "9002:9000"
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user \"$${CLICKHOUSE_USER}\" --password \"$${CLICKHOUSE_PASSWORD}\" --query 'SELECT 1'"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    volumes:
      - datawarehouse_data:/var/lib/clickhouse
      - ./scripts/create_clickhouse_tables.sql:/docker-entrypoint-initdb.d/create_clickhouse_tables.sql
  application:
    image: samanalishiri/application:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: application
    hostname: application
    depends_on:
      database:
        condition: service_started
      datalake:
        condition: service_started
      datawarehouse:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./output:/app/output
    environment:
      DATA_DIR: /app/data
      OUTPUT_DIR: /app/output
      DATABASE_URL: postgresql+psycopg2://admin:admin@database:5432/sale_oltp
      DATALAKE_ENDPOINT: http://datalake:9000
      DATALAKE_ACCESS_KEY: admin
      DATALAKE_SECRET_KEY: administrator
      DATALAKE_BUCKET_NAME: sale-datalake
      DATAWAREHOUSE_HOST: datawarehouse
      DATAWAREHOUSE_PORT: 8123
      DATAWAREHOUSE_USER: admin
      DATAWAREHOUSE_PASSWORD: admin
    command: sh -c "python -m src.main && tail -f /dev/null"

volumes:
  database_data:
  minio_data:
  datawarehouse_data:
