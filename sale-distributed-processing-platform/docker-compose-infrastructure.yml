
services:
  sale-postgres:
    image: postgres:16
    container_name: sale-postgres
    environment:
      POSTGRES_DB: sale_oltp
      POSTGRES_USER: sale_platform_user
      POSTGRES_PASSWORD: sale_platform_password
    ports:
      - "5432:5432"
    volumes:
      - sale_postgres_data:/var/lib/postgresql/data
      - ./scripts/create_postgres_tables.sql:/docker-entrypoint-initdb.d/create_postgres_tables.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready --username sale_platform_user --dbname sale_oltp"]
      interval: 5s
      timeout: 5s
      retries: 20

  sale-data-lake:
    image: minio/minio:latest
    container_name: sale-data-lake
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: sale_data_lake_user
      MINIO_ROOT_PASSWORD: sale_data_lake_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - sale_data_lake_data:/data
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  sale-data-lake-init:
    image: minio/mc:latest
    container_name: sale-data-lake-init
    depends_on:
      sale-data-lake:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://sale-data-lake:9000 sale_data_lake_user sale_data_lake_password
        mc mb --ignore-existing local/sale-data-lake

  sale-warehouse:
    image: clickhouse/clickhouse-server:latest
    container_name: sale-warehouse
    environment:
      CLICKHOUSE_DB: sale_warehouse
      CLICKHOUSE_USER: sale_warehouse_user
      CLICKHOUSE_PASSWORD: sale_warehouse_password
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"
      - "9002:9000"
    volumes:
      - sale_warehouse_data:/var/lib/clickhouse
      - ./scripts/create_clickhouse_tables.sql:/docker-entrypoint-initdb.d/create_clickhouse_tables.sql
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user sale_warehouse_user --password sale_warehouse_password --query 'SELECT 1'"]
      interval: 5s
      timeout: 5s
      retries: 20

  sale-spark-master:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: sale-spark-master
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master
    environment:
      SPARK_NO_DAEMONIZE: "true"
    ports:
      - "7077:7077"
      - "8081:8080"
    volumes:
      - ./src:/app/src
      - ./data:/app/data

  sale-spark-worker:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: sale-spark-worker
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://sale-spark-master:7077
    environment:
      SPARK_NO_DAEMONIZE: "true"
      SPARK_WORKER_CORES: 2
      SPARK_WORKER_MEMORY: 2g
    depends_on:
      - sale-spark-master
    ports:
      - "8082:8081"
    volumes:
      - ./src:/app/src
      - ./data:/app/data

volumes:
  sale_postgres_data:
  sale_data_lake_data:
  sale_warehouse_data:
