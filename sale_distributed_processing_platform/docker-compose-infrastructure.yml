name: dev
services:
  database:
    image: postgres:16
    environment:
      POSTGRES_DB: sale_oltp
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - database_data:/var/lib/postgresql/data
      - ./scripts/create_postgres_tables.sql:/docker-entrypoint-initdb.d/create_postgres_tables.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready --username admin --dbname sale_oltp"]
      interval: 5s
      timeout: 5s
      retries: 20
  datalake:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: administrator
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - datalake_data:/data
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20
  datalake-init:
    image: minio/mc:latest
    depends_on:
      datalake:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://datalake:9000 admin administrator
        mc mb --ignore-existing local/sale-datalake

  datawarehouse:
    image: clickhouse/clickhouse-server:latest
    environment:
      CLICKHOUSE_DB: sale_warehouse
      CLICKHOUSE_USER: admin
      CLICKHOUSE_PASSWORD: admin
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"
      - "9002:9000"
    volumes:
      - datawarehouse_data:/var/lib/clickhouse
      - ./scripts/create_clickhouse_tables.sql:/docker-entrypoint-initdb.d/create_clickhouse_tables.sql
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user admin --password admin --query 'SELECT 1'"]
      interval: 5s
      timeout: 5s
      retries: 20
  master:
    build:
      context: .
      dockerfile: spark/Dockerfile
    image: samanalishiri/spark-4-java21-python3:latest
    container_name: master
    hostname: master
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master --host master --port 7077 --webui-port 8080
    ports:
      - "7077:7077"   # master RPC
      - "8080:8080"   # master UI
    volumes:
      - "./resources:/resources"
  worker:
    build:
      context: .
      dockerfile: spark/Dockerfile
    image: samanalishiri/spark-4-java21-python3:latest
    container_name: worker
    hostname: worker
    depends_on:
      - master
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://master:7077 --webui-port 8081
    ports:
      - "8081:8081"   # worker UI
    volumes:
      - "./resources:/resources"

volumes:
  database_data:
  datalake_data:
  datawarehouse_data:
